<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 12px;
            margin: 0;
            background-color: #fcfcfc;
        }

        h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

        /* Save Section */
        .section { margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        button {
            width: 100%;
            padding: 8px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }

        /* Tree View Section */
        #treeContainer {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
            background: white;
            padding: 5px;
            border-radius: 4px;
        }
        
        ul { list-style: none; padding-left: 15px; margin: 5px 0; }
        li { margin: 4px 0; cursor: pointer; font-size: 13px; }
        
        .folder { font-weight: bold; color: #555; }
        .circuit { color: #007bff; padding: 2px 4px; border-radius: 3px; }
        .circuit:hover { background-color: #e7f3ff; }

        /* Tools Footer */
        .footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dotted #ccc;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .footer button {
            flex: 1;
            font-size: 11px;
            background-color: #666;
            padding: 5px;
        }
        .footer button#resetBtn { background-color: #dc3545; }
    </style>
</head>
<body>

    <h3>Falstad Hierarchy</h3>

    <div class="section">
        <input type="text" id="pathInput" placeholder="Folder/Subfolder/SubName">
        <button id="saveBtn">Save to Library</button>
    </div>

    <div id="treeContainer">
        <!-- Folders and Circuits will appear here -->
    </div>

    <div class="footer">
        <button id="exportBtn">Backup JSON</button>
        <button id="importBtn">Restore JSON</button>
        <button id="resetBtn">Full Reset</button>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFile" style="display:none" accept=".json">

    <script src="popup.js"></script>
</body>
</html>
